server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Vite emits content-hashed filenames, so a given URL's bytes never change.
  # Cache for a year and skip revalidation. `try_files ... =404` stops a missing
  # asset from falling through to the SPA rule and being served index.html.
  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # index.html names the current bundle and is not hashed, so it must always be
  # revalidated — otherwise a browser pins itself to an old build. `no-cache`
  # means "revalidate before use", not "don't store"; the ETag makes it a 304.
  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate" always;
  }

  # SPA fallback. /subscription/success and /subscription/cancel are client-side
  # routes (see App.tsx) that the hosted checkout redirects to — without this
  # they 404 and the in-app browser never bounces back into the mobile app.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
