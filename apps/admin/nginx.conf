server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Vite emits content-hashed filenames (index-DWzJwPIX.js), so a given URL's
  # bytes never change. Cache them for a year and skip revalidation entirely.
  # `try_files ... =404` matters: without it a missing asset falls through to the
  # SPA rule below and returns index.html with a 200, so the browser tries to
  # execute HTML as JavaScript.
  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # index.html is NOT hashed — it is the thing that names the current bundle.
  # A cached copy pins the browser to an old build forever, which is why admin
  # kept showing stale UI after a deploy. `no-cache` does not mean "don't store":
  # it means "revalidate before use", and the ETag makes that a cheap 304.
  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate" always;
  }

  # SPA fallback so client-side routes resolve. The internal redirect to
  # /index.html re-enters location matching, so the no-cache header above applies.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
